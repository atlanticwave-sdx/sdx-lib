[tox]
env_list =
    py311, lint, format
minversion = 4.24.2

[testenv]
description = run the tests with pytest
package = wheel
wheel_build_env = .pkg
deps =
    pytest>=6
    pytest-cov
commands =
    pytest --cov=sdxlib --cov-report=term-missing --cov-report=html {tty:--color=yes} {posargs}

[testenv:lint]
deps = flake8
commands = flake8 sdxlib tests

[testenv:format]
deps = black
commands = black --check sdxlib tests